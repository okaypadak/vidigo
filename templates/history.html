<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VIDIGO / Gecmis</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Space+Grotesk:wght@400;500;700&display=swap');

    :root {
      --bg: #030711;
      --panel: rgba(8, 14, 28, 0.84);
      --line: rgba(72, 243, 255, 0.18);
      --cyan: #48f3ff;
      --pink: #ff5ca9;
      --green: #73ffb2;
      --text: #e8f6ff;
      --muted: #88a4b6;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Space Grotesk', sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(72, 243, 255, 0.12), transparent 28%),
        radial-gradient(circle at bottom right, rgba(255, 92, 169, 0.1), transparent 22%),
        linear-gradient(180deg, #040814, #010308);
    }

    .wrap {
      max-width: 1080px;
      margin: 0 auto;
      padding: 34px 18px 72px;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 22px;
    }

    .brand {
      margin: 0;
      font-family: 'Orbitron', monospace;
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 900;
      letter-spacing: 0.24rem;
      background: linear-gradient(90deg, var(--cyan), #ffffff, var(--pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .nav a,
    .nav button {
      border: 1px solid var(--line);
      background: rgba(8, 14, 28, 0.72);
      color: var(--text);
      text-decoration: none;
      padding: 10px 16px;
      cursor: pointer;
      font-family: 'Orbitron', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.12rem;
      text-transform: uppercase;
    }

    .nav a:hover,
    .nav button:hover {
      color: var(--cyan);
      border-color: var(--cyan);
    }

    .panel {
      background: linear-gradient(180deg, rgba(8, 14, 28, 0.92), rgba(5, 9, 18, 0.92));
      border: 1px solid var(--line);
      padding: 22px;
      position: relative;
    }

    .panel::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      color: var(--cyan);
      font-family: 'Orbitron', monospace;
      font-size: 0.74rem;
      letter-spacing: 0.12rem;
      text-transform: uppercase;
    }

    .eyebrow span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border: 1px solid var(--cyan);
      border-radius: 50%;
      font-size: 0.66rem;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
      color: var(--muted);
    }

    .btn {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      padding: 10px 16px;
      cursor: pointer;
      font: inherit;
      text-transform: uppercase;
      letter-spacing: 0.06rem;
    }

    .btn:hover {
      border-color: var(--cyan);
      color: var(--cyan);
    }

    .list {
      display: grid;
      gap: 14px;
    }

    .empty {
      border: 1px dashed var(--line);
      padding: 16px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.02);
    }

    .card {
      border: 1px solid rgba(72, 243, 255, 0.14);
      background: rgba(255, 255, 255, 0.02);
      padding: 16px;
    }

    .head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
    }

    .meta {
      font-size: 0.74rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08rem;
      line-height: 1.6;
    }

    .grid {
      display: grid;
      gap: 8px;
      margin-bottom: 12px;
    }

    .row {
      border-left: 2px solid rgba(72, 243, 255, 0.3);
      padding: 8px 10px;
      background: rgba(0, 0, 0, 0.22);
    }

    .key {
      display: block;
      color: var(--muted);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08rem;
      margin-bottom: 4px;
    }

    .value {
      color: var(--text);
      font-size: 0.86rem;
      line-height: 1.5;
      word-break: break-word;
      white-space: pre-wrap;
      font-family: Consolas, monospace;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%) translateY(16px);
      opacity: 0;
      transition: 0.2s ease;
      padding: 12px 18px;
      border: 1px solid var(--line);
      background: rgba(2, 8, 18, 0.95);
      color: var(--green);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 640px) {
      .wrap { padding: 24px 14px 60px; }
      .panel { padding: 18px; }
      .btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1 class="brand">VIDIGO</h1>
      <div class="nav">
        <a href="/">Ana Sayfa</a>
        <button type="button" onclick="fetchHistory()">Yenile</button>
      </div>
    </div>

    <section class="panel">
      <div class="eyebrow"><span>01</span> Indirme Gecmisi</div>
      <div class="toolbar">
        <div id="historySummary">Kayitlar yukleniyor...</div>
      </div>
      <div class="list" id="historyList">
        <div class="empty">Kayitlar yukleniyor...</div>
      </div>
    </section>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let historyItems = [];
    let toastTimer;

    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.className = "toast show";
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 2500);
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function formatDate(value) {
      if (!value) return "-";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleString("tr-TR");
    }

    function renderField(label, value) {
      if (!value) return "";
      return `
        <div class="row">
          <span class="key">${escapeHtml(label)}</span>
          <div class="value">${escapeHtml(value)}</div>
        </div>
      `;
    }

    function copyItem(index) {
      const item = historyItems[index];
      if (!item) return;
      navigator.clipboard.writeText(JSON.stringify(item, null, 2)).then(() => showToast("Kayit kopyalandi"));
    }

    function renderHistory(items) {
      historyItems = items || [];
      const list = document.getElementById("historyList");
      document.getElementById("historySummary").textContent = `${historyItems.length} kayit bulundu`;

      if (!historyItems.length) {
        list.innerHTML = `<div class="empty">Henuz kayit bulunmuyor.</div>`;
        return;
      }

      list.innerHTML = historyItems.map((item, index) => `
        <article class="card">
          <div class="head">
            <div>
              <div class="title">${escapeHtml(item.video_name || item.file_name || item.video_id || "Adsiz kayit")}</div>
              <div class="meta">
                ${(item.platform || "unknown").toUpperCase()} / ${(item.source_type || "single").toUpperCase()} / ${escapeHtml(formatDate(item.created_at))}
              </div>
            </div>
          </div>
          <div class="grid">
            ${renderField("Kaynak", item.source_name)}
            ${renderField("URL", item.url || item.source_url)}
            ${renderField("Dosya", item.file_path)}
            ${renderField("Manifest", item.manifest_path)}
            ${renderField("Yukleyen", item.uploader)}
            ${renderField("Indirici", item.downloader)}
            ${renderField("Transcript", item.transcript)}
          </div>
          <div class="actions">
            <button class="btn" type="button" onclick="copyItem(${index})">JSON Kopyala</button>
          </div>
        </article>
      `).join("");
    }

    async function fetchHistory() {
      document.getElementById("historySummary").textContent = "Kayitlar yukleniyor...";
      document.getElementById("historyList").innerHTML = `<div class="empty">Kayitlar yukleniyor...</div>`;
      try {
        const res = await fetch("/history?limit=100");
        const data = await res.json();
        if (!res.ok || data.error) {
          throw new Error(data.error || "Gecmis alinamadi");
        }
        renderHistory(data.items || []);
      } catch (error) {
        document.getElementById("historySummary").textContent = "Gecmis yuklenemedi";
        document.getElementById("historyList").innerHTML = `<div class="empty">${escapeHtml(error.message || "Gecmis alinamadi")}</div>`;
      }
    }

    fetchHistory();
  </script>
</body>
</html>
