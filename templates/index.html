<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VIDIGO</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cyan: #00f5ff;
      --cyan-dim: rgba(0,245,255,0.15);
      --cyan-glow: rgba(0,245,255,0.4);
      --pink: #ff0080;
      --pink-dim: rgba(255,0,128,0.15);
      --green: #00ff88;
      --bg: #020408;
      --glass: rgba(255,255,255,0.03);
      --glass2: rgba(255,255,255,0.06);
      --border: rgba(0,245,255,0.15);
      --text: #e0f0ff;
      --muted: rgba(150,200,220,0.5);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── ANIMATED BG ── */
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(0,245,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,255,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .bg-orb {
      position: fixed; border-radius: 50%; filter: blur(120px);
      pointer-events: none; z-index: 0;
    }
    .bg-orb-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(0,245,255,0.08) 0%, transparent 70%);
      top: -200px; left: -200px;
      animation: drift1 12s ease-in-out infinite alternate;
    }
    .bg-orb-2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(255,0,128,0.07) 0%, transparent 70%);
      bottom: -150px; right: -150px;
      animation: drift2 14s ease-in-out infinite alternate;
    }
    @keyframes drift1 { to { transform: translate(60px, 60px); } }
    @keyframes drift2 { to { transform: translate(-60px, -60px); } }

    /* ── LAYOUT ── */
    .wrap {
      position: relative; z-index: 1;
      max-width: 720px;
      margin: 0 auto;
      padding: 60px 20px 100px;
    }

    /* ── HEADER ── */
    .logo {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: 3.6rem;
      letter-spacing: 8px;
      text-align: center;
      background: linear-gradient(90deg, var(--cyan), #fff, var(--pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
      filter: drop-shadow(0 0 30px rgba(0,245,255,0.5));
    }
    .logo::after {
      content: 'VIDIGO';
      position: absolute;
      inset: 0;
      background: inherit;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: blur(18px);
      opacity: 0.4;
    }

    .tagline {
      text-align: center;
      margin-top: 10px;
      font-size: 0.78rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* GPU status */
    .status-bar {
      display: flex;
      justify-content: center;
      margin-top: 24px;
      margin-bottom: 52px;
    }
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 18px;
      border: 1px solid var(--border);
      border-radius: 99px;
      background: var(--glass);
      font-size: 0.72rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      backdrop-filter: blur(10px);
    }
    .pulse-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #333;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .pulse-dot.on {
      background: var(--green);
      box-shadow: 0 0 8px var(--green), 0 0 20px var(--green);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 8px var(--green), 0 0 20px var(--green); }
      50%      { box-shadow: 0 0 4px var(--green), 0 0 8px var(--green); }
    }

    /* ── PANEL (replaces card) ── */
    .panel {
      position: relative;
      background: var(--glass);
      backdrop-filter: blur(20px);
      border-radius: 2px;
      border: 1px solid var(--border);
      padding: 32px;
      margin-bottom: 24px;
      overflow: hidden;
    }
    .panel::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    }
    /* corner deco */
    .panel::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 20px; height: 20px;
      border-top: 2px solid var(--cyan);
      border-left: 2px solid var(--cyan);
    }
    .corner-br {
      position: absolute;
      bottom: 0; right: 0;
      width: 20px; height: 20px;
      border-bottom: 2px solid var(--cyan);
      border-right: 2px solid var(--cyan);
      pointer-events: none;
    }

    /* Panel label */
    .panel-label {
      font-family: 'Orbitron', monospace;
      font-size: 0.62rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--cyan);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .panel-label-num {
      width: 22px; height: 22px;
      border: 1px solid var(--cyan);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.6rem;
      color: var(--cyan);
      flex-shrink: 0;
    }

    /* ── INPUTS ── */
    .input-wrap {
      position: relative;
    }
    .input-wrap svg.icon {
      position: absolute; left: 16px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }
    input[type="text"] {
      width: 100%;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(0,245,255,0.2);
      border-radius: 2px;
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.95rem;
      padding: 15px 16px 15px 46px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      letter-spacing: 0.5px;
    }
    input[type="text"]:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 1px var(--cyan), 0 0 20px var(--cyan-dim), inset 0 0 20px rgba(0,245,255,0.03);
    }
    input[type="text"]::placeholder { color: var(--muted); font-size: 0.85rem; }

    /* ── BUTTONS ── */
    .btn-row {
      display: flex; gap: 12px; margin-top: 14px; flex-wrap: wrap;
    }
    .btn {
      flex: 1; min-width: 130px;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 13px 20px;
      border: none; border-radius: 2px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.85rem; font-weight: 600;
      letter-spacing: 1px; text-transform: uppercase;
      cursor: pointer;
      position: relative; overflow: hidden;
      transition: transform 0.1s, box-shadow 0.2s;
    }
    .btn:active { transform: scale(0.97); }
    .btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.08) 50%, transparent 100%);
      transform: translateX(-100%);
      transition: transform 0.4s;
    }
    .btn:hover::before { transform: translateX(100%); }

    .btn-cyan {
      background: linear-gradient(135deg, rgba(0,245,255,0.15), rgba(0,245,255,0.05));
      border: 1px solid var(--cyan);
      color: var(--cyan);
      box-shadow: 0 0 12px rgba(0,245,255,0.1), inset 0 0 12px rgba(0,245,255,0.05);
    }
    .btn-cyan:hover { box-shadow: 0 0 24px var(--cyan-glow), inset 0 0 20px rgba(0,245,255,0.1); }

    .btn-pink {
      background: linear-gradient(135deg, rgba(255,0,128,0.15), rgba(255,0,128,0.05));
      border: 1px solid var(--pink);
      color: var(--pink);
      box-shadow: 0 0 12px rgba(255,0,128,0.1), inset 0 0 12px rgba(255,0,128,0.05);
    }
    .btn-pink:hover { box-shadow: 0 0 24px rgba(255,0,128,0.5), inset 0 0 20px rgba(255,0,128,0.1); }

    .btn-green {
      background: linear-gradient(135deg, rgba(0,255,136,0.15), rgba(0,255,136,0.05));
      border: 1px solid var(--green);
      color: var(--green);
      box-shadow: 0 0 12px rgba(0,255,136,0.1), inset 0 0 12px rgba(0,255,136,0.05);
    }
    .btn-green:hover { box-shadow: 0 0 24px rgba(0,255,136,0.5), inset 0 0 20px rgba(0,255,136,0.1); }

    .btn-ghost {
      background: var(--glass);
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .btn-ghost:hover { border-color: var(--cyan); color: var(--cyan); }

    /* icon-only btn */
    .btn-icon {
      padding: 13px 14px;
      flex: 0;
    }

    /* toggle */
    .toggle-row {
      display: flex; align-items: center; gap: 10px;
      margin-top: 14px;
      font-size: 0.75rem; letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--muted);
    }
    .toggle {
      position: relative; width: 36px; height: 20px; flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(0,245,255,0.2);
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 12px; height: 12px;
      left: 3px; top: 3px;
      background: var(--muted);
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }
    .toggle input:checked + .toggle-slider {
      background: rgba(0,245,255,0.12);
      border-color: var(--cyan);
    }
    .toggle input:checked + .toggle-slider::before {
      transform: translateX(16px);
      background: var(--cyan);
    }

    /* platform badges */
    .badge-row { display: flex; gap: 8px; margin-top: 12px; }
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 12px; border-radius: 2px;
      font-size: 0.7rem; letter-spacing: 1px; text-transform: uppercase;
      border: 1px solid; font-weight: 600;
    }
    .badge-yt  { border-color: rgba(255,60,60,0.4); color: rgba(255,80,80,0.8); background: rgba(255,0,0,0.05); }
    .badge-ig  { border-color: rgba(225,48,108,0.4); color: rgba(240,100,150,0.9); background: rgba(225,48,108,0.05); }

    .btn-ig {
      background: linear-gradient(135deg, rgba(225,48,108,0.15), rgba(193,53,132,0.05));
      border: 1px solid rgba(225,48,108,0.6);
      color: rgba(240,100,150,1);
      box-shadow: 0 0 12px rgba(225,48,108,0.1), inset 0 0 12px rgba(225,48,108,0.05);
    }
    .btn-ig:hover { box-shadow: 0 0 28px rgba(225,48,108,0.5), inset 0 0 20px rgba(225,48,108,0.1); }

    /* file upload */
    .file-zone {
      display: flex; align-items: center; gap: 12px;
    }
    .file-label {
      flex: 1;
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px;
      background: rgba(0,0,0,0.4);
      border: 1px dashed rgba(0,245,255,0.2);
      border-radius: 2px;
      cursor: pointer;
      color: var(--muted);
      font-size: 0.85rem;
      transition: border-color 0.2s, color 0.2s;
    }
    .file-label:hover { border-color: var(--cyan); color: var(--cyan); }
    .file-label span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    input[type="file"] { display: none; }

    /* select */
    .select-wrap { display: flex; gap: 12px; align-items: stretch; }
    select {
      flex: 1;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(0,245,255,0.2);
      border-radius: 2px;
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.9rem;
      padding: 13px 16px;
      outline: none;
      appearance: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    select:focus { border-color: var(--cyan); }
    select option { background: #0d1117; }

    /* divider */
    .divider {
      border: none;
      border-top: 1px solid rgba(0,245,255,0.08);
      margin: 28px 0;
    }

    /* textarea */
    .result-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .result-title {
      font-family: 'Orbitron', monospace;
      font-size: 0.6rem; letter-spacing: 3px; color: var(--cyan);
    }
    textarea {
      width: 100%;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(0,245,255,0.1);
      border-radius: 2px;
      color: #7affdc;
      font-family: 'Courier New', monospace;
      font-size: 0.83rem;
      line-height: 1.7;
      padding: 16px;
      resize: vertical;
      min-height: 220px;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: var(--cyan); box-shadow: 0 0 20px rgba(0,245,255,0.05); }
    textarea::placeholder { color: rgba(0,245,255,0.2); font-size: 0.8rem; }

    /* progress */
    .progress-wrap { display: none; margin-top: 16px; }
    .progress-wrap.show { display: block; }
    .progress-track {
      background: rgba(0,0,0,0.5);
      border: 1px solid var(--border);
      border-radius: 2px; height: 4px; overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--cyan), var(--pink));
      width: 30%;
      animation: scan 1.5s linear infinite;
    }
    @keyframes scan {
      0%   { margin-left: -30%; }
      100% { margin-left: 110%; }
    }
    .progress-label {
      font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase;
      color: var(--cyan); margin-top: 8px; text-align: center;
      animation: blink 1.2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      padding: 12px 28px;
      background: rgba(2,4,8,0.95);
      border: 1px solid var(--border);
      border-radius: 2px;
      font-size: 0.82rem; letter-spacing: 1px;
      color: var(--cyan);
      box-shadow: 0 0 30px rgba(0,245,255,0.15);
      backdrop-filter: blur(20px);
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      z-index: 9999;
      white-space: nowrap;
    }
    .toast::before {
      content: '> ';
      color: var(--pink);
      font-family: monospace;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.err { border-color: var(--pink); color: var(--pink); box-shadow: 0 0 30px rgba(255,0,128,0.15); }
    .toast.ok  { border-color: var(--green); color: var(--green); box-shadow: 0 0 30px rgba(0,255,136,0.15); }
  </style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>

<div class="wrap">

  <!-- HEADER -->
  <div class="logo">VIDIGO</div>
  <div class="tagline">Video &nbsp;·&nbsp; Audio &nbsp;·&nbsp; Transcript</div>

  <div class="status-bar">
    <div class="status-pill">
      <div class="pulse-dot" id="gpuDot"></div>
      <span id="gpuStatus">SYSTEM CHECK...</span>
    </div>
  </div>

  <!-- PANEL 1: Download -->
  <div class="panel">
    <div class="corner-br"></div>
    <div class="panel-label">
      <div class="panel-label-num">01</div>
      Video / Ses İndir
    </div>

    <div class="input-wrap">
      <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
      </svg>
      <input type="text" id="videoUrl" placeholder="YouTube veya X.com bağlantısı buraya..." />
    </div>

    <div class="badge-row">
      <span class="badge badge-yt">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.19a3.02 3.02 0 0 0-2.13-2.14C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.37.55A3.02 3.02 0 0 0 .5 6.19C0 8.07 0 12 0 12s0 3.93.5 5.81a3.02 3.02 0 0 0 2.13 2.14C4.5 20.5 12 20.5 12 20.5s7.5 0 9.37-.55a3.02 3.02 0 0 0 2.13-2.14C24 15.93 24 12 24 12s0-3.93-.5-5.81zM9.75 15.52V8.48L15.82 12l-6.07 3.52z"/></svg>
        YouTube
      </span>
      <span class="badge badge-ig">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg>
        Instagram
      </span>
    </div>

    <div class="toggle-row">
      <label class="toggle">
        <input type="checkbox" id="tsToggle" checked />
        <span class="toggle-slider"></span>
      </label>
      Zaman Damgası
    </div>

    <!-- YouTube -->
    <div class="btn-row" id="ytActionRow" style="display:none">
      <button class="btn btn-pink" onclick="youtubeTranscribe()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
        </svg>
        MP3 İndir
      </button>
    </div>

    <!-- Instagram -->
    <div class="btn-row" id="igActionRow" style="display:none">
      <button class="btn btn-ig" onclick="instagramTranscribe()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
        </svg>
        MP3 İndir
      </button>
    </div>

    <div class="progress-wrap" id="urlProgress">
      <div class="progress-track"><div class="progress-bar"></div></div>
      <div class="progress-label">İşleniyor...</div>
    </div>
  </div>

  <!-- PANEL 2: Result -->
  <div class="panel">
    <div class="corner-br"></div>
    <div class="result-head">
      <span class="result-title">// Output</span>
      <button class="btn btn-ghost" style="padding:8px 14px; font-size:0.72rem; letter-spacing:1px;" onclick="copyResult()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        COPY
      </button>
    </div>
    <textarea id="result" placeholder="> transkript çıktısı burada görünecek..."></textarea>
  </div>

</div><!-- /wrap -->

<div id="toast" class="toast"></div>

<script>
  async function checkGpuStatus() {
    try {
      const res = await fetch("/status");
      const data = await res.json();
      const dot = document.getElementById("gpuDot");
      const txt = document.getElementById("gpuStatus");
      if (data.gpu) {
        dot.classList.add("on");
        txt.textContent = "GPU · ACTIVE";
      } else {
        txt.textContent = "GPU · OFFLINE · CPU MODE";
      }
    } catch {
      document.getElementById("gpuStatus").textContent = "SYSTEM UNREACHABLE";
    }
  }

  document.getElementById("videoUrl").addEventListener("input", checkUrlType);

  function isYouTubeUrl(url) {
    return url.includes("youtube.com") || url.includes("youtu.be");
  }
  function isInstagramUrl(url) {
    return url.includes("instagram.com");
  }

  function checkUrlType() {
    const url = document.getElementById("videoUrl").value.trim();
    const ytRow = document.getElementById("ytActionRow");
    const igRow = document.getElementById("igActionRow");
    ytRow.style.display = isYouTubeUrl(url) ? "flex" : "none";
    igRow.style.display = isInstagramUrl(url) ? "flex" : "none";
  }

let toastTimer;
  function showToast(msg, type = "") {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className = "toast show" + (type ? " " + type : "");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove("show"), 3500);
  }

  function showProgress(id) { document.getElementById(id).classList.add("show"); }
  function hideProgress(id) { document.getElementById(id).classList.remove("show"); }

  function copyResult() {
    const v = document.getElementById("result").value;
    if (!v) return;
    navigator.clipboard.writeText(v).then(() => showToast("Panoya kopyalandı", "ok"));
  }

  async function _transcribeRequest(endpoint, url, toastMsg) {
    showToast(toastMsg);
    showProgress("urlProgress");
    document.getElementById("result").value = "";
    const timestamps = document.getElementById("tsToggle").checked;
    try {
      const res = await fetch(endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url, timestamps })
      });
      const d = await res.json();
      hideProgress("urlProgress");
      if (!res.ok || d.error) { showToast(d.error || "Bir hata oluştu", "err"); return; }
      document.getElementById("result").value = d.text || "";
      const engine = d.engine === "youtube_api" ? "YouTube API" : "Whisper";
      showToast(`Transkript tamamlandı (${engine})`, "ok");
    } catch {
      hideProgress("urlProgress");
      showToast("Bağlantı hatası", "err");
    }
  }

  function instagramTranscribe() {
    const url = document.getElementById("videoUrl").value.trim();
    if (!url) return;
    _transcribeRequest("/instagram_transcribe", url, "Instagram indiriliyor...");
  }

  function youtubeTranscribe() {
    const url = document.getElementById("videoUrl").value.trim();
    if (!url) return;
    _transcribeRequest("/youtube_transcribe", url, "YouTube indiriliyor...");
  }

  checkGpuStatus();
  checkUrlType();
</script>
</body>
</html>
